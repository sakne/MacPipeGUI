appId: com.macpipegui.multi
productName: MacPipeGUI Multi
directories:
  output: release
  buildResources: build
files:
  - dist
  - dist-electron
publish:
  provider: github
  owner: sakne
  repo: MacPipeGUI
  releaseType: draft
win:
  icon: public/app-icon.png
  artifactName: MacPipeGUI-Multi-Setup-${version}.${ext}
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: MacPipeGUI Multi
  uninstallDisplayName: MacPipeGUI Multi
mac:
  icon: public/app-icon.png
  artifactName: MacPipeGUI-Multi-${version}-${arch}.${ext}
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
linux:
  icon: public/app-icon.png
  artifactName: MacPipeGUI-Multi-${version}.${ext}
  target:
    - AppImage
  category: Development
